<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Todos</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            max-width: 820px;
            margin: 2em auto;
            padding: 0 1em;
            color: #222;
        }
        h1 { font-weight: 500; margin-bottom: 0.2em; }
        .meta { color: #999; font-size: 0.85em; margin-bottom: 1.5em; }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 0.6em 0.5em;
            border-bottom: 2px solid #ddd;
            font-weight: 500;
            color: #666;
            font-size: 0.9em;
        }
        td { padding: 0.55em 0.5em; border-bottom: 1px solid #eee; }
        tr.done td { color: #aaa; text-decoration: line-through; }
        td.prio-high { color: #c33; font-weight: 600; }
        td.prio-med  { color: #c80; }
        td.prio-low  { color: #888; }
        td.empty { text-align: center; color: #aaa; padding: 2em; }
    </style>
</head>
<body>
    <h1>Todos</h1>
    <p class="meta">Last refresh: $now &middot; reload the page to see updates</p>
    <table>
        <thead>
            <tr><th>Status</th><th>ID</th><th>Priority</th><th>Due</th><th>Text</th></tr>
        </thead>
        <tbody>
$rows
        </tbody>
    </table>
</body>
</html>
